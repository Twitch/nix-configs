#        src: "{{ dotfiles_dir }}/screen/screenrc.local"
#        dest: "{{ user_home }}/.screenrc.local"
#        state: link
#        force: yes
#
#    - name: Ensure ~/.screenrc exists
#      ansible.builtin.file:
#        path: "{{ user_home }}/.screenrc"
#        state: touch
#        mode: "0640"
#        owner: "{{ user_name }}"
#        group: "{{ user_name }}"
#
#    - name: Ensure ~/.screenrc includes .screenrc.local
#      ansible.builtin.blockinfile:
#        path: "{{ user_home }}/.screenrc"
#        marker: "# {mark} ANSIBLE MANAGED - screen local"
#        block: |
#          if [ -f "$HOME/.screenrc.local" ]; then
#            source "$HOME/.screenrc.local"
#          fi
#        insertafter: EOF
#        owner: "{{ user_name }}"
#        group: "{{ user_name }}"
#        mode: "0640"

    #####################################################################
    # vim customization
    #####################################################################
    - name: Deploy vim local config
      ansible.builtin.file:
        src: "{{ dotfiles_dir }}/vim/vimrc.local"
        dest: "{{ user_home }}/.vimrc.local"
        state: link
        force: yes

    - name: Ensure ~/.vimrc exists
      ansible.builtin.file:
        path: "{{ user_home }}/.vimrc"
        state: touch
        mode: "0640"
        owner: "{{ user_name }}"
        group: "{{ user_name }}"

    - name: Ensure ~/.vimrc sources .vimrc.local
      ansible.builtin.blockinfile:
        path: "{{ user_home }}/.vimrc"
        marker: "\" {mark} ANSIBLE MANAGED - vim local"
        block: |
          if filereadable(expand("~/.vimrc.local"))
            source ~/.vimrc.local
          endif
        insertafter: EOF
        owner: "{{ user_name }}"
        group: "{{ user_name }}"
        mode: "0640"