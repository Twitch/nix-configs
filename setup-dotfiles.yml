---
- name: Set up shell and editor customizations because bish, I be picky
  hosts: localhost
  connection: local
  vars:
    dotfiles_repo: "git@github.com:Twitch/nix-configs.git"
    dotfiles_version: "main"
    dotfiles_dir: "{{ ansible_env.HOME }}/.bsconfig/.dotfiles"
    user_home: "{{ ansible_env.HOME }}"
    user_name: "{{ ansible_user_id | default(ansible_env.USER) }}"
    git_user_name: "Ben"
    git_user_email: "no@thx"
    git_default_branch: "main"

  tasks:
    #####################################################################
    # Ensure required packages exist (tmux, screen, vim)
    #####################################################################
    - name: Ensure tmux, screen, vim are installed
      become: true
      ansible.builtin.package:
        name:
          - git
          - tmux
          # - screen
          - vim
        state: present

    #####################################################################
    # Set global git configs
    #####################################################################
    - hosts: localhost
      connection: local
      tasks:
        - name: Ensure community.general collection is installed
          ansible.builtin.command:
            cmd: ansible-galaxy collection install community.general
          register: galaxy_out
          changed_when: '"Nothing to do." not in galaxy_out.stdout'
        
        - name: Set Git global user.name
          community.general.git_config:
            name: user.name
            value: "{{ git_user_name }}"
            scope: global
          become: false

        - name: Set Git global user.email
          community.general.git_config:
            name: user.email
            value: "{{ git_user_email }}"
            scope: global
          become: false
        
        - name: Set Git default initial branch name
          community.general.git_config:
            name: init.defaultBranch
            value: "{{ git_default_branch }}"
            scope: global
          become: false


    #####################################################################
    # Clone/update dotfiles from GitHub
    #####################################################################
    - name: Clone dotfiles repo
      ansible.builtin.git:
        repo: "{{ dotfiles_repo }}"
        dest: "{{ dotfiles_dir }}"
        version: "{{ dotfiles_version }}"
        update: yes

    #####################################################################
    # dircolors customization (~/.dircolors)
    #####################################################################
    - name: Deploy custom dircolors
      ansible.builtin.file:
        src: "{{ dotfiles_dir }}/bash/dircolors"
        dest: "{{ user_home }}/.dircolors"
        state: link
        force: yes

    #####################################################################
    # Prompt customization (separate file, sourced from .bashrc)
    #####################################################################
    - name: Deploy custom prompt script
      ansible.builtin.file:
        src: "{{ dotfiles_dir }}/bash/prompt.sh"
        dest: "{{ user_home }}/.bash_prompt"
        state: link
        force: yes

    - name: Ensure .bashrc sources .bash_prompt
      ansible.builtin.blockinfile:
        path: "{{ user_home }}/.bashrc"
        marker: "# {mark} ANSIBLE MANAGED - prompt"
        block: |
          if [ -f "$HOME/.bash_prompt" ]; then
            . "$HOME/.bash_prompt"
          fi
        create: yes
        mode: "0640"
        owner: "{{ user_name }}"
        group: "{{ user_name }}"

    #####################################################################
    # Bash customizations via ~/.bashrc.local + include
    #####################################################################
    - name: Deploy .bashrc.local from dotfiles
      ansible.builtin.file:
        src: "{{ dotfiles_dir }}/bash/bashrc.local"
        dest: "{{ user_home }}/.bashrc.local"
        state: link
        force: yes

    - name: Ensure .bashrc sources .bashrc.local
      ansible.builtin.blockinfile:
        path: "{{ user_home }}/.bashrc"
        marker: "# {mark} ANSIBLE MANAGED - bashrc.local"
        block: |
          if [ -f "$HOME/.bashrc.local" ]; then
            . "$HOME/.bashrc.local"
          fi
        create: yes
        mode: "0640"
        owner: "{{ user_name }}"
        group: "{{ user_name }}"

    #####################################################################
    # tmux install + customization
    #####################################################################
    # Main tmux config may be distro-provided; just ensure it sources our local file.

    - name: Deploy tmux local config
      ansible.builtin.file:
        src: "{{ dotfiles_dir }}/tmux/tmux.conf.local"
        dest: "{{ user_home }}/.tmux.conf.local"
        state: link
        force: yes

    - name: Ensure ~/.tmux.conf exists
      ansible.builtin.file:
        path: "{{ user_home }}/.tmux.conf"
        state: touch
        mode: "0640"
        owner: "{{ user_name }}"
        group: "{{ user_name }}"

    - name: Ensure ~/.tmux.conf sources .tmux.conf.local
      ansible.builtin.blockinfile:
        path: "{{ user_home }}/.tmux.conf"
        marker: "# {mark} ANSIBLE MANAGED - tmux local"
        block: |
          if-shell 'test -f ~/.tmux.conf.local' 'source-file ~/.tmux.conf.local'
        insertafter: EOF
        owner: "{{ user_name }}"
        group: "{{ user_name }}"
        mode: "0640"

    ##########################
    ## tmux plugin mgr goop ##
    ##########################
    - name: Ensure tmux plugins directory exists
      ansible.builtin.file:
        path: "{{ user_home }}/.tmux/plugins"
        state: directory
        owner: "{{ user_name }}"
        group: "{{ user_name }}"
        mode: "0755"
    
    - name: Install or update TPM
      ansible.builtin.git:
        repo: "https://github.com/tmux-plugins/tpm.git"
        dest: "{{ user_home }}/.tmux/plugins/tpm"
        version: master
        update: yes
        force: yes
      become: false

    - name: Install tmux plugins via TPM (non-interactive)
      ansible.builtin.command:
        cmd: "{{ user_home }}/.tmux/plugins/tpm/bin/install_plugins"
      environment:
        TMUX_PLUGIN_MANAGER_PATH: "{{ user_home }}/.tmux/plugins"
      become: false
      changed_when: true   # TPM doesn't have a great idempotent output

    #####################################################################
    # screen install + customization
    #####################################################################
